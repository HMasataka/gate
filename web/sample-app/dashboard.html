<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard - sample app</title>
    <link rel="stylesheet" href="../shared/variables.css" />
    <link rel="stylesheet" href="../shared/components.css" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="sample-layout">
      <nav class="sample-nav">
        <a class="sample-nav-logo" href="./index.html"
          ><strong>sample app</strong></a
        >
        <button class="btn btn-secondary btn-sm" onclick="signOut()">
          Sign out
        </button>
      </nav>

      <div id="loading-view" class="sample-hero">
        <div class="processing-card">
          <div class="spinner"></div>
          <div class="processing-subtitle">Loading your profile...</div>
        </div>
      </div>

      <div id="dashboard-view" class="hidden">
        <div class="dashboard-content">
          <div class="user-greeting" id="greeting">
            Hello, <strong id="user-email-display">...</strong>
          </div>

          <div class="info-card" id="userinfo-card">
            <h3>User Information</h3>
            <div id="userinfo-rows">
              <!-- Populated by JS -->
            </div>
          </div>

          <div class="info-card">
            <h3>Token Information</h3>
            <div class="info-row">
              <span class="info-key">access_token</span>
              <div class="token-row">
                <span class="token-truncated" id="token-display"></span>
                <button class="btn btn-ghost btn-sm" onclick="copyToken()">
                  Copy
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div id="error-view" class="sample-hero hidden">
        <div class="processing-card">
          <div class="alert alert-error" style="text-align: left">
            <div>
              <strong>Failed to load profile</strong>
              <div id="error-text" style="margin-top: 6px"></div>
            </div>
          </div>
          <div style="margin-top: 20px">
            <button class="btn btn-secondary" onclick="signOut()">
              Sign out
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="toast-container" id="toast-container"></div>

    <script>
      const API_BASE = "http://localhost:8080";

      function getToken() {
        return localStorage.getItem("access_token");
      }

      function showToast(message, type = "success") {
        const container = document.getElementById("toast-container");
        const toast = document.createElement("div");
        toast.className = `toast ${type}`;
        toast.textContent = message;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
      }

      function signOut() {
        localStorage.removeItem("access_token");
        localStorage.removeItem("refresh_token");
        window.location.href = "./index.html";
      }

      function copyToken() {
        const token = getToken() || "";
        navigator.clipboard
          .writeText(token)
          .then(() => {
            showToast("Access token copied to clipboard.");
          })
          .catch(() => {
            const ta = document.createElement("textarea");
            ta.value = token;
            document.body.appendChild(ta);
            ta.select();
            document.execCommand("copy");
            document.body.removeChild(ta);
            showToast("Access token copied to clipboard.");
          });
      }

      function escapeHtml(str) {
        if (str === null || str === undefined) return "-";
        return String(str)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function renderUserInfo(data) {
        const container = document.getElementById("userinfo-rows");
        container.innerHTML = "";

        const fields = [
          "sub",
          "email",
          "email_verified",
          "name",
          "given_name",
          "family_name",
          "picture",
          "locale",
        ];
        const displayed = new Set();

        fields.forEach((key) => {
          if (data[key] !== undefined) {
            displayed.add(key);
            const row = document.createElement("div");
            row.className = "info-row";
            row.innerHTML = `
            <span class="info-key">${escapeHtml(key)}</span>
            <span class="info-value">${escapeHtml(String(data[key]))}</span>
          `;
            container.appendChild(row);
          }
        });

        // Render any remaining fields not in the predefined list
        Object.keys(data).forEach((key) => {
          if (!displayed.has(key)) {
            const row = document.createElement("div");
            row.className = "info-row";
            row.innerHTML = `
            <span class="info-key">${escapeHtml(key)}</span>
            <span class="info-value">${escapeHtml(String(data[key]))}</span>
          `;
            container.appendChild(row);
          }
        });

        // Greeting
        const email = data.email || data.sub || "user";
        document.getElementById("user-email-display").textContent = email;
      }

      async function loadUserInfo() {
        const token = getToken();
        if (!token) {
          window.location.href = "./index.html";
          return;
        }

        // Show token info
        const tokenDisplay = document.getElementById("token-display");
        tokenDisplay.textContent = token.substring(0, 40) + "...";

        try {
          const res = await fetch(`${API_BASE}/oauth/userinfo`, {
            headers: { Authorization: "Bearer " + token },
          });

          document.getElementById("loading-view").classList.add("hidden");

          if (res.status === 401) {
            localStorage.removeItem("access_token");
            window.location.href = "./index.html";
            return;
          }

          const data = await res.json().catch(() => ({}));

          if (!res.ok) {
            document.getElementById("error-view").classList.remove("hidden");
            document.getElementById("error-text").textContent =
              data.error || data.message || "Failed to load user info.";
            return;
          }

          document.getElementById("dashboard-view").classList.remove("hidden");
          renderUserInfo(data);
        } catch (err) {
          document.getElementById("loading-view").classList.add("hidden");
          document.getElementById("error-view").classList.remove("hidden");
          document.getElementById("error-text").textContent =
            "Network error. Please try again.";
        }
      }

      loadUserInfo();
    </script>
  </body>
</html>
