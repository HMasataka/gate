<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create account - gate</title>
    <link rel="stylesheet" href="../shared/variables.css" />
    <link rel="stylesheet" href="../shared/components.css" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="auth-layout">
      <div class="auth-brand">
        <div class="auth-brand-title">gate</div>
        <div class="auth-brand-subtitle">Identity Provider</div>
        <div class="auth-brand-desc">
          Create your gate account to start building OAuth applications. Access
          the client portal and manage your integrations.
        </div>
      </div>

      <div class="auth-form-area">
        <div class="auth-form-card">
          <h2>Create account</h2>
          <p class="subtitle">Register to get started with gate.</p>

          <div id="error-msg" class="alert alert-error hidden">
            <span id="error-text"></span>
          </div>

          <div class="form-group">
            <label class="form-label" for="email">Email</label>
            <input
              class="form-input"
              type="email"
              id="email"
              placeholder="user@example.com"
              autocomplete="email"
            />
          </div>

          <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <input
              class="form-input"
              type="password"
              id="password"
              placeholder="Choose a password"
              autocomplete="new-password"
            />
          </div>

          <div class="form-group">
            <label class="form-label" for="confirm-password"
              >Confirm password</label
            >
            <input
              class="form-input"
              type="password"
              id="confirm-password"
              placeholder="Repeat your password"
              autocomplete="new-password"
            />
          </div>

          <button
            class="btn btn-primary btn-full"
            id="submit-btn"
            onclick="handleRegister()"
          >
            Create account
          </button>

          <div class="auth-footer">
            Already have an account? <a href="./login.html">Sign in</a>
          </div>
        </div>
      </div>
    </div>

    <div class="toast-container" id="toast-container"></div>

    <script>
      const API_BASE = "http://localhost:8080";

      function showError(message) {
        const msg = document.getElementById("error-msg");
        document.getElementById("error-text").textContent = message;
        msg.classList.remove("hidden");
      }

      function hideError() {
        document.getElementById("error-msg").classList.add("hidden");
      }

      function showToast(message, type = "success") {
        const container = document.getElementById("toast-container");
        const toast = document.createElement("div");
        toast.className = `toast ${type}`;
        toast.textContent = message;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
      }

      async function handleRegister() {
        hideError();

        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const confirmPassword =
          document.getElementById("confirm-password").value;
        const btn = document.getElementById("submit-btn");

        if (!email || !password || !confirmPassword) {
          showError("All fields are required.");
          return;
        }

        if (password !== confirmPassword) {
          showError("Passwords do not match.");
          return;
        }

        if (password.length < 8) {
          showError("Password must be at least 8 characters.");
          return;
        }

        btn.disabled = true;
        btn.textContent = "Creating account...";

        try {
          const res = await fetch(`${API_BASE}/api/v1/auth/register`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password }),
          });

          const data = await res.json().catch(() => ({}));

          if (!res.ok) {
            showError(
              data.message ||
                data.error ||
                "Registration failed. Please try again.",
            );
            return;
          }

          showToast("Account created successfully. Please sign in.");
          setTimeout(() => {
            window.location.href = "./login.html";
          }, 1200);
        } catch (err) {
          showError("Network error. Please try again.");
        } finally {
          btn.disabled = false;
          btn.textContent = "Create account";
        }
      }

      document.addEventListener("keydown", (e) => {
        if (e.key === "Enter") handleRegister();
      });
    </script>
  </body>
</html>
