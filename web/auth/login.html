<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign in - gate</title>
    <link rel="stylesheet" href="../shared/variables.css" />
    <link rel="stylesheet" href="../shared/components.css" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="auth-layout">
      <div class="auth-brand">
        <div class="auth-brand-title">gate</div>
        <div class="auth-brand-subtitle">Identity Provider</div>
        <div class="auth-brand-desc">
          Secure OAuth 2.0 authorization server with OpenID Connect support.
          Manage clients, users, and access tokens from a single platform.
        </div>
      </div>

      <div class="auth-form-area">
        <div class="auth-form-card">
          <h2>Sign in</h2>
          <p class="subtitle">
            Welcome back. Enter your credentials to continue.
          </p>

          <div id="error-msg" class="alert alert-error hidden">
            <span id="error-text"></span>
          </div>

          <div class="form-group">
            <label class="form-label" for="email">Email</label>
            <input
              class="form-input"
              type="email"
              id="email"
              placeholder="user@example.com"
              autocomplete="email"
            />
          </div>

          <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <input
              class="form-input"
              type="password"
              id="password"
              placeholder="Enter your password"
              autocomplete="current-password"
            />
          </div>

          <button
            class="btn btn-primary btn-full"
            id="submit-btn"
            onclick="handleLogin()"
          >
            Sign in
          </button>

          <div class="auth-footer">
            Don't have an account? <a href="./register.html">Register</a>
          </div>
        </div>
      </div>
    </div>

    <div class="toast-container" id="toast-container"></div>

    <script>
      const API_BASE = "http://localhost:8080";

      function showError(message) {
        const msg = document.getElementById("error-msg");
        document.getElementById("error-text").textContent = message;
        msg.classList.remove("hidden");
      }

      function hideError() {
        document.getElementById("error-msg").classList.add("hidden");
      }

      function showToast(message, type = "success") {
        const container = document.getElementById("toast-container");
        const toast = document.createElement("div");
        toast.className = `toast ${type}`;
        toast.textContent = message;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
      }

      async function handleLogin() {
        hideError();

        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const btn = document.getElementById("submit-btn");

        if (!email || !password) {
          showError("Email and password are required.");
          return;
        }

        btn.disabled = true;
        btn.textContent = "Signing in...";

        try {
          const res = await fetch(`${API_BASE}/api/v1/auth/login`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password }),
          });

          const data = await res.json().catch(() => ({}));

          if (!res.ok) {
            showError(data.message || data.error || "Invalid credentials.");
            return;
          }

          if (data.access_token) {
            localStorage.setItem("access_token", data.access_token);
            if (data.email) localStorage.setItem("user_email", data.email);
          }

          window.location.href = "../dashboard/index.html";
        } catch (err) {
          showError("Network error. Please try again.");
        } finally {
          btn.disabled = false;
          btn.textContent = "Sign in";
        }
      }

      document.addEventListener("keydown", (e) => {
        if (e.key === "Enter") handleLogin();
      });
    </script>
  </body>
</html>
