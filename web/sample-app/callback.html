<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Authenticating... - sample app</title>
    <link rel="stylesheet" href="../shared/variables.css" />
    <link rel="stylesheet" href="../shared/components.css" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="sample-layout">
      <nav class="sample-nav">
        <a class="sample-nav-logo" href="./index.html"
          ><strong>sample app</strong></a
        >
      </nav>

      <div class="sample-hero">
        <div id="processing-view" class="processing-card">
          <div class="spinner"></div>
          <div class="processing-title">Exchanging authorization code...</div>
          <div class="processing-subtitle">
            Please wait while we complete authentication.
          </div>
        </div>

        <div id="error-view" class="processing-card hidden">
          <div
            class="alert alert-error"
            id="error-alert"
            style="text-align: left"
          >
            <div>
              <strong>Authentication failed</strong>
              <div id="error-message" style="margin-top: 6px"></div>
            </div>
          </div>
          <div style="margin-top: 20px">
            <a href="./index.html" class="btn btn-secondary">Back to home</a>
          </div>
        </div>
      </div>
    </div>

    <script>
      const API_BASE = "http://localhost:8080";
      const CLIENT_ID = "sample-client";

      function showError(message) {
        document.getElementById("processing-view").classList.add("hidden");
        document.getElementById("error-view").classList.remove("hidden");
        document.getElementById("error-message").textContent = message;
      }

      async function handleCallback() {
        const params = new URLSearchParams(window.location.search);
        const code = params.get("code");
        const state = params.get("state");
        const error = params.get("error");
        const errorDescription = params.get("error_description");

        if (error) {
          showError(errorDescription || error || "Authorization was denied.");
          return;
        }

        if (!code) {
          showError("No authorization code received.");
          return;
        }

        const storedState = sessionStorage.getItem("oauth_state");
        if (state && storedState && state !== storedState) {
          showError("State mismatch. Possible CSRF attack detected.");
          return;
        }

        const codeVerifier = sessionStorage.getItem("pkce_verifier");
        if (!codeVerifier) {
          showError("Missing PKCE code verifier. Please try again.");
          return;
        }

        const redirectUri =
          window.location.origin + "/web/sample-app/callback.html";

        const body = new URLSearchParams({
          grant_type: "authorization_code",
          code: code,
          redirect_uri: redirectUri,
          client_id: CLIENT_ID,
          code_verifier: codeVerifier,
        });

        try {
          const res = await fetch(`${API_BASE}/api/v1/oauth/token`, {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body: body.toString(),
          });

          const data = await res.json().catch(() => ({}));

          if (!res.ok) {
            showError(
              data.error_description ||
                data.error ||
                data.message ||
                "Token exchange failed.",
            );
            return;
          }

          if (!data.access_token) {
            showError("No access token received from server.");
            return;
          }

          sessionStorage.removeItem("pkce_verifier");
          sessionStorage.removeItem("oauth_state");

          localStorage.setItem("access_token", data.access_token);
          if (data.refresh_token)
            localStorage.setItem("refresh_token", data.refresh_token);

          window.location.href = "./dashboard.html";
        } catch (err) {
          showError("Network error during token exchange. Please try again.");
        }
      }

      handleCallback();
    </script>
  </body>
</html>
