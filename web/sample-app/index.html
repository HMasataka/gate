<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>sample app - OAuth Demo</title>
    <link rel="stylesheet" href="../shared/variables.css" />
    <link rel="stylesheet" href="../shared/components.css" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="sample-layout">
      <nav class="sample-nav">
        <a class="sample-nav-logo" href="./index.html"
          ><strong>sample app</strong></a
        >
        <span style="font-size: 11px; color: var(--text-muted)"
          >gate OAuth 2.0 demo</span
        >
      </nav>

      <div class="sample-hero">
        <div class="hero-card">
          <h1>sample app</h1>
          <p>
            This is a demonstration of the gate OAuth 2.0 flow with PKCE. Click
            the button below to authenticate via gate.
          </p>
          <button
            class="btn btn-primary"
            onclick="startLogin()"
            style="font-size: 14px; padding: 12px 28px"
          >
            Login with gate
          </button>
          <div class="note">
            You will be redirected to gate for authentication.
          </div>
        </div>
      </div>
    </div>

    <script>
      const API_BASE = "http://localhost:8080";
      const CLIENT_ID = "sample-client";

      function base64urlEncode(buffer) {
        return btoa(String.fromCharCode(...new Uint8Array(buffer)))
          .replace(/\+/g, "-")
          .replace(/\//g, "_")
          .replace(/=+$/, "");
      }

      async function generatePKCE() {
        const array = new Uint8Array(32);
        crypto.getRandomValues(array);
        const verifier = base64urlEncode(array);

        const encoder = new TextEncoder();
        const data = encoder.encode(verifier);
        const hash = await crypto.subtle.digest("SHA-256", data);
        const challenge = base64urlEncode(hash);

        return { verifier, challenge };
      }

      function generateState() {
        const array = new Uint8Array(16);
        crypto.getRandomValues(array);
        return base64urlEncode(array);
      }

      async function startLogin() {
        const { verifier, challenge } = await generatePKCE();
        const state = generateState();

        sessionStorage.setItem("pkce_verifier", verifier);
        sessionStorage.setItem("oauth_state", state);

        const redirectUri =
          window.location.origin + "/web/sample-app/callback.html";

        const params = new URLSearchParams({
          response_type: "code",
          client_id: CLIENT_ID,
          redirect_uri: redirectUri,
          scope: "openid email profile",
          code_challenge: challenge,
          code_challenge_method: "S256",
          state: state,
        });

        window.location.href = `${API_BASE}/api/v1/oauth/authorize?${params.toString()}`;
      }
    </script>
  </body>
</html>
